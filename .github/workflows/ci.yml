name: CI

# Portão de qualidade do app: typecheck + lint + build + testes.
# Roda em todo PR para a main e em push na main. O pipeline geoespacial é separado
# (ingest-ndvi.yml) e não é afetado por este workflow.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Testes
        run: npm run test
