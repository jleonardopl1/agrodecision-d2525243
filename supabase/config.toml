# Supabase local config — AgroDecision
project_id = "agrodecision"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # true em produção

# Workers / Edge Functions (cron configurado via pg_cron em produção)
[functions.cotacao-worker]
verify_jwt = false
[functions.sinal-ia-worker]
verify_jwt = false
[functions.alerta-worker]
verify_jwt = false
[functions.relatorio-worker]
verify_jwt = false

# Canais do bot: chamados por Telegram/Meta (sem JWT do Supabase) e entre si
# (header x-worker-secret). A autenticação é feita DENTRO de cada função — por
# isso verify_jwt = false (senão a plataforma devolve 401 antes do código rodar).
# O whatsapp-webhook valida a assinatura HMAC da Meta (ver signature.ts).
[functions.chatbot]
verify_jwt = false
[functions.telegram-webhook]
verify_jwt = false
[functions.whatsapp-webhook]
verify_jwt = false
