# Supabase local config — AgroDecision
project_id = "agrodecision"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # true em produção

# Workers / Edge Functions (cron configurado via pg_cron em produção)
[functions.cotacao-worker]
verify_jwt = false
[functions.sinal-ia-worker]
verify_jwt = false
[functions.alerta-worker]
verify_jwt = false
[functions.relatorio-worker]
verify_jwt = false

# Chatbot e webhooks (Fase 1) — verify_jwt = false porque a autenticação é feita
# DENTRO da função, não pela plataforma:
#  - chatbot: aceita tanto o JWT do cooperado (valida com auth.getUser) quanto a
#    chamada interna dos webhooks com header x-worker-secret (sem JWT).
#  - telegram-webhook: protegido pelo secret token do Telegram (header).
#  - whatsapp-webhook: verificação GET por hub.verify_token e POST por assinatura
#    HMAC X-Hub-Signature-256 (Meta) — nenhum deles envia JWT do Supabase.
[functions.chatbot]
verify_jwt = false
[functions.telegram-webhook]
verify_jwt = false
[functions.whatsapp-webhook]
verify_jwt = false
